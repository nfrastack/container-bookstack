services:
  bookstack-app:
    image: docker.io/nfrastack/bookstack:develop
    container_name: bookstack-app
    labels:
      - traefik.enable=true
      - traefik.http.routers.bookstack.rule=Host(`bookstack.example.com`)
      - traefik.http.services.bookstack.loadbalancer.server.port=80
    volumes:
      - ./data:/data
      - ./logs:/logs/
    environment:
      - CONTAINER_NAME=bookstack-app
      - TIMEZONE=America/Vancouver

      - DB_HOST=bookstack-db
      - DB_PORT=3306
      - DB_NAME=bookstack
      - DB_USER=bookstack
      - DB_PASS=bookstackpass

      - ADMIN_EMAIL=admin@example.com
      - ADMIN_NAME=Bookstack Admin
      - ADMIN_PASS=password

      - SITE_URL=https://bookstack.example.com    # legacy alias for APP_URL

      - MAIL_DRIVER=smtp
      - MAIL_FROM=bookstack@example.com
      - MAIL_FROM_NAME=BookStack Test
      - SMTP_HOST=postfix-relay
      - SMTP_PORT=25
      - SMTP_ENCRYPTION=null
      # - SMTP_USER=...
      # - SMTP_PASS_FILE=/run/secrets/smtp_password

      # Other BookStack `.env` keys via the BOOKSTACK_ passthrough
      #- BOOKSTACK_APP_DEBUG=false
      - BOOKSTACK_APP_LANG=en
      - BOOKSTACK_APP_AUTO_LANG_PUBLIC=false
      - BOOKSTACK_APP_TIMEZONE=America/Vancouver
    networks:
      - proxy
      - services
    restart: always

  bookstack-db:
    image: docker.io/nfrastack/mariadb:11.8
    container_name: bookstack-db
    volumes:
      - ./db:/data
    environment:
      - DEBUG_MODE=FALSE
      - ROOT_PASS=rootpassword
      - DB_NAME=bookstack
      - DB_USER=bookstack
      - DB_PASS=bookstackpass
    networks:
      - services
    restart: always

  bookstack-db-backup:
    image: docker.io/tiredofit/db-backup
    container_name: bookstack-db-backup
    volumes:
      - ./dbbackup:/backup
    environment:
      - DB01_HOST=bookstack-db
      - DB01_TYPE=mariadb
      - DB01_NAME=bookstack
      - DB01_USER=bookstack
      - DB01_PASS=bookstackpass
      - DB01_BACKUP_INTERVAL=1440
      - DB01_BACKUP_BEGIN=0000
      - DB01_CLEANUP_TIME=8640
    networks:
      - services
    restart: always

networks:
  proxy:
    external: true
  services:
    external: true
